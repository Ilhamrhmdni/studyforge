<!DOCTYPE html>
<html>
<head><title>Gemini Key Test</title></head>
<body>
<h2>Gemini API Test</h2>
<pre id="out">Testing...</pre>
<script>
const KEY = 'AIzaSyDGpZtG_UoYwF63JVlkOM0cibVqOiYBwyw';

async function run() {
  const out = document.getElementById('out');
  
  // 1. List available models
  out.textContent = 'Fetching available models...\n';
  const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${KEY}`);
  const d = await r.json();
  
  if (d.error) {
    out.textContent += 'API Error: ' + d.error.message + '\n';
    return;
  }
  
  const genModels = (d.models||[]).filter(m => m.supportedGenerationMethods?.includes('generateContent'));
  out.textContent += `Available models (${genModels.length}):\n`;
  genModels.forEach(m => out.textContent += '  - ' + m.name + '\n');
  
  // 2. Try the first available model
  if (genModels.length > 0) {
    const modelName = genModels[0].name; // e.g. "models/gemini-1.5-flash"
    out.textContent += `\nTesting ${modelName}...\n`;
    const r2 = await fetch(`https://generativelanguage.googleapis.com/v1beta/${modelName}:generateContent?key=${KEY}`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({contents:[{parts:[{text:'Say OK in Indonesian'}]}]})
    });
    const d2 = await r2.json();
    const text = d2.candidates?.[0]?.content?.parts?.[0]?.text;
    const err = d2.error?.message;
    out.textContent += text ? '✅ Works! Response: ' + text : '❌ Error: ' + err;
  }
}
run();
</script>
</body>
</html>
