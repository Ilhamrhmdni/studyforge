<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Login — StudyForge</title>
<link rel="stylesheet" href="/css/style.css"/>
<style>
.auth-container {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 2rem 1rem; background: var(--bg);
}
.auth-box {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; padding: 2.5rem 2rem; max-width: 400px; width: 100%;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2); text-align: center;
}
.auth-tabs { display: flex; gap: 1rem; margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
.auth-tab { flex: 1; background: none; border: none; color: var(--text2); font-size: 1rem; font-weight: 600; cursor: pointer; padding: 0.5rem; transition: color 0.2s; }
.auth-tab.active { color: var(--primary); border-bottom: 2px solid var(--primary); margin-bottom: -0.6rem; }
.auth-form { display: none; text-align: left; }
.auth-form.active { display: block; }
.form-msg { padding: 0.8rem; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1rem; display: none; }
.form-msg.error { background: rgba(239,68,68,0.1); color: var(--danger); border: 1px solid rgba(239,68,68,0.2); }
.form-msg.success { background: rgba(16,185,129,0.1); color: var(--success); border: 1px solid rgba(16,185,129,0.2); }
</style>
</head>
<body>

<div class="auth-container">
  <div class="auth-box">
    <div style="font-size:2.5rem; margin-bottom:1rem;">⚡</div>
    <h1 style="font-size:1.5rem; margin-bottom:0.5rem;">StudyForge</h1>
    <p style="color:var(--text2); font-size:0.9rem; margin-bottom:2rem;">Platform Latihan Ujian Terbaik</p>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login', this)">Masuk</button>
      <button class="auth-tab" onclick="switchTab('register', this)">Daftar</button>
    </div>

    <div class="form-msg" id="authMsg"></div>

    <!-- LOGIN FORM -->
    <form class="auth-form active" id="form-login" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="l_email" required placeholder="user@email.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="l_password" required placeholder="••••••••"/>
      </div>
      <button class="btn btn-primary" type="submit" style="width:100%; justify-content:center; margin-top:1rem;">Masuk</button>
    </form>

    <!-- REGISTER FORM -->
    <form class="auth-form" id="form-register" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label class="form-label">Nama Lengkap</label>
        <input class="form-input" type="text" id="r_name" required placeholder="Budi Santoso"/>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="r_email" required placeholder="user@email.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="r_password" required minlength="6" placeholder="Minimal 6 karakter"/>
      </div>
      <button class="btn btn-primary" type="submit" style="width:100%; justify-content:center; margin-top:1rem;">Buat Akun</button>
    </form>
    
    <div style="margin-top:2rem;">
      <a href="/" style="color:var(--text2); font-size:0.85rem;">← Kembali ke Beranda</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/site-config.js"></script>
<script src="/js/auth.js"></script>
<script>
function switchTab(tab, triggerEl = null) {
  document.querySelectorAll('.auth-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
  
  const activeTab = triggerEl || document.querySelector(`.auth-tab[onclick*="'${tab}'"]`);
  if (activeTab) activeTab.classList.add('active');
  document.getElementById('form-' + tab).classList.add('active');
  document.getElementById('authMsg').style.display = 'none';
}

function showMsg(text, isError=false) {
  const el = document.getElementById('authMsg');
  el.textContent = text;
  el.className = 'form-msg ' + (isError ? 'error' : 'success');
  el.style.display = 'block';
}

async function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('l_email').value;
  const password = document.getElementById('l_password').value;
  const btn = e.target.querySelector('button');
  
  btn.disabled = true; btn.textContent = 'Memproses...';
  
  const sb = initSupabase();
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  
  if (error) {
    showMsg(error.message, true);
    btn.disabled = false; btn.textContent = 'Masuk';
  } else {
    showMsg('Berhasil masuk! Mengalihkan...');
    const redirect = sessionStorage.getItem('sf_redirect') || '/';
    sessionStorage.removeItem('sf_redirect');
    setTimeout(() => window.location.href = redirect, 1000);
  }
}

async function handleRegister(e) {
  e.preventDefault();
  const name = document.getElementById('r_name').value;
  const email = document.getElementById('r_email').value;
  const password = document.getElementById('r_password').value;
  const btn = e.target.querySelector('button');
  
  btn.disabled = true; btn.textContent = 'Memproses...';
  
  const sb = initSupabase();
  const { data, error } = await sb.auth.signUp({
    email, password,
    options: {
      data: { full_name: name }
    }
  });
  
  if (error) {
    showMsg(error.message, true);
    btn.disabled = false; btn.textContent = 'Buat Akun';
  } else {
    showMsg('Akun berhasil dibuat! Silakan masuk.');
    setTimeout(() => {
      document.getElementById('l_email').value = email;
      switchTab('login');
    }, 1500);
  }
}

// Redirect if already logged in
window.onload = async () => {
  const user = await checkUserAuth();
  if (user) window.location.href = '/';
};
</script>
</body>
</html>
